appId: com.towlink.app
---
# This test verifies the no_drivers scenario.
# To trigger no_drivers, we need no available drivers in emulator.
# The seed script creates available drivers, so this test would need
# a modified seed or to run after drivers have been marked unavailable.
# For now, this is a placeholder that verifies the UI can handle the
# no_drivers state -- it logs in as commuter and submits a request
# to a location outside any company's service radius.

- runFlow: subflows/login-commuter.yaml

- tapOn:
    id: "request-assistance-btn"

# Use a location far from the seeded company (which is in LA)
- tapOn:
    id: "pickup-address-input"
- inputText: "123 Main St, Anchorage, AK"

- tapOn:
    id: "dropoff-address-input"
- inputText: "456 Oak Ave, Anchorage, AK"
- hideKeyboard

- tapOn:
    id: "vehicle-year-input"
- inputText: "2020"

- tapOn:
    id: "vehicle-make-input"
- inputText: "Honda"

- tapOn:
    id: "vehicle-model-input"
- inputText: "Civic"
- hideKeyboard

- scrollUntilVisible:
    element:
      id: "submit-request-btn"
    direction: DOWN
- tapOn:
    id: "submit-request-btn"

# Should eventually show no drivers available
# Using 60s timeout to account for Cloud Functions emulator cold-start latency (15-25s)
- assertVisible:
    text: "No drivers available"
    timeout: 60000

# Verify Try Again button appears
- assertVisible:
    id: "try-again-btn"
    timeout: 5000
