appId: com.towlink.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "email-input"
- inputText: "test-driver@test.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- hideKeyboard
- tapOn:
    id: "login-btn"
- extendedWaitUntil:
    visible:
      text: "Offline"
    timeout: 10000
