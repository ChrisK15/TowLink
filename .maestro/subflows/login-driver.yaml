appId: com.towlink.app
---
# Launch app and navigate through Expo dev client + onboarding to driver login
- launchApp:
    clearState: true

# Expo dev client: tap the dev server
- extendedWaitUntil:
    visible:
      text: "http://localhost:8081"
    timeout: 10000
- tapOn:
    text: "http://localhost:8081"

# Expo dev client: tap Continue
- extendedWaitUntil:
    visible:
      text: "Continue"
    timeout: 10000
- tapOn:
    text: "Continue"

# Close Expo dev menu by tapping dimmed area above the modal
- tapOn:
    point: "50%,30%"

# Onboarding: tap Next 2 times, then Get Started (using testID)
- extendedWaitUntil:
    visible:
      id: "onboarding-next-btn"
    timeout: 10000
- tapOn:
    id: "onboarding-next-btn"
- tapOn:
    id: "onboarding-next-btn"
- tapOn:
    id: "onboarding-next-btn"

# Role selection: Continue as Driver (using testID)
- extendedWaitUntil:
    visible:
      id: "role-driver-btn"
    timeout: 10000
- tapOn:
    id: "role-driver-btn"

# Signup screen: tap "Already have an account? Login" to get to login screen
- extendedWaitUntil:
    visible:
      text: "Already have an account? Login"
    timeout: 10000
- tapOn:
    text: "Already have an account? Login"

# Login screen: enter driver credentials
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputText: "test-driver@test.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- hideKeyboard
- tapOn:
    id: "login-btn"

# Wait for driver screen to load
- extendedWaitUntil:
    visible:
      text: "Offline"
    timeout: 10000
