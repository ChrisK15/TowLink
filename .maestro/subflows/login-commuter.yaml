appId: com.towlink.app
---
# Launch app and navigate through Expo dev client + onboarding to commuter login
- launchApp:
    clearState: true

# Expo dev client: tap the dev server
- extendedWaitUntil:
    visible:
      text: "http://localhost:8081"
    timeout: 10000
- tapOn:
    text: "http://localhost:8081"

# Expo dev client: tap Continue
- extendedWaitUntil:
    visible:
      text: "Continue"
    timeout: 10000
- tapOn:
    text: "Continue"

# Close Expo dev menu by tapping dimmed area above the modal
- tapOn:
    point: "50%,30%"

# Onboarding: tap Next 2 times, then Get Started
- extendedWaitUntil:
    visible:
      text: "Welcome to TowLink"
    timeout: 10000
- tapOn:
    text: "Next →"
- tapOn:
    text: "Next →"
- tapOn:
    text: "Get Started →"

# Role selection: Continue as Customer
- extendedWaitUntil:
    visible:
      text: "Continue as Customer →"
    timeout: 10000
- tapOn:
    text: "Continue as Customer →"

# Commuter login screen: enter credentials
- extendedWaitUntil:
    visible:
      id: "commuter-email-input"
    timeout: 10000
- tapOn:
    id: "commuter-email-input"
- inputText: "test-commuter@test.com"
- tapOn:
    id: "commuter-password-input"
- inputText: "password123"
- hideKeyboard
- tapOn:
    id: "commuter-sign-in-btn"

# Wait for commuter screen to load
- extendedWaitUntil:
    visible:
      text: "Request Roadside Assistance"
    timeout: 10000
