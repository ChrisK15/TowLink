appId: com.towlink.app
---
# Launch app and navigate through Expo dev client + onboarding to admin login
- launchApp:
    clearState: true

# Expo dev client: tap the dev server
- extendedWaitUntil:
    visible:
      text: "http://localhost:8081"
    timeout: 10000
- tapOn:
    text: "http://localhost:8081"

# Expo dev client: tap Continue
- extendedWaitUntil:
    visible:
      text: "Continue"
    timeout: 10000
- tapOn:
    text: "Continue"

# Close Expo dev menu by tapping dimmed area above the modal
- tapOn:
    point: "50%,30%"

# Onboarding: tap Next 2 times, then Get Started
- extendedWaitUntil:
    visible:
      text: "Welcome to TowLink"
    timeout: 10000
- tapOn:
    text: "Next"
- tapOn:
    text: "Next"
- tapOn:
    text: "Get Started"

# Role selection: Continue as Driver -> goes to signup screen
# (Admin uses same login path as driver - there's no admin-specific onboarding)
- extendedWaitUntil:
    visible:
      text: "Continue as Driver"
    timeout: 10000
- tapOn:
    text: "Continue as Driver"

# Signup screen: tap "Already have an account? Login" to get to login screen
- extendedWaitUntil:
    visible:
      text: "Already have an account? Login"
    timeout: 10000
- tapOn:
    text: "Already have an account? Login"

# Login screen: enter admin credentials
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputText: "test-admin@test.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- hideKeyboard
- tapOn:
    id: "login-btn"

# Wait for admin screen to load
- extendedWaitUntil:
    visible:
      text: "Jobs"
    timeout: 10000
