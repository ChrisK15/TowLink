appId: com.towlink.app
---
# Driver logs in and sees the pre-seeded claimed request.
# The seed script (Plan 01) creates a request with:
#   status: 'claimed'
#   claimedByDriverId: <test-driver-uid>
# The driver's useClaimedRequest hook listens for exactly these fields
# via listenForClaimedRequests (queries status=='claimed' + claimedByDriverId==driverId).
# When the driver goes online, the hook picks up this request and shows RequestPopup.

- runFlow: subflows/login-driver.yaml

- tapOn:
    id: "go-online-btn"

# Dismiss the "You are now online!" alert
- tapOn:
    text: "OK"
    timeout: 5000

# The request popup should appear with the seeded job
- assertVisible:
    text: "New Request"
    timeout: 15000

# Accept the request
- tapOn:
    id: "accept-request-btn"

# Should see active trip sheet with "En Route to Pickup"
- assertVisible:
    text: "En Route to Pickup"
    timeout: 10000

# Advance through trip stages
- tapOn:
    id: "advance-trip-btn"
- assertVisible:
    text: "Arrived at Pickup"
    timeout: 5000

- tapOn:
    id: "advance-trip-btn"
- assertVisible:
    text: "Service in Progress"
    timeout: 5000

- tapOn:
    id: "advance-trip-btn"
- assertVisible:
    text: "Trip Completed"
    timeout: 5000
