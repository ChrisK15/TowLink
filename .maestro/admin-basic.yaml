appId: com.towlink.app
---
# Admin logs in and navigates between Jobs and Drivers tabs

- runFlow: subflows/login-admin.yaml

# Should see Jobs tab content (header says "Jobs")
- assertVisible:
    text: "Jobs"

# Tap Drivers tab
- tapOn:
    text: "Drivers"

# Should see drivers content (the seeded drivers should appear)
- extendedWaitUntil:
    visible:
      text: "Drivers"
    timeout: 5000

# Tap back to Jobs tab
- tapOn:
    text: "Jobs"

- extendedWaitUntil:
    visible:
      text: "Jobs"
    timeout: 5000
