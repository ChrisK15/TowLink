appId: com.towlink.app
---
# Commuter logs in and submits a tow request
- runFlow: subflows/login-commuter.yaml

# Tap "Request Roadside Assistance" button
- tapOn:
    id: "request-assistance-btn"

# Fill out the request form
- tapOn:
    id: "pickup-address-input"
- inputText: "123 Main St, Los Angeles, CA"

- tapOn:
    id: "dropoff-address-input"
- inputText: "456 Oak Ave, Los Angeles, CA"
- hideKeyboard

- tapOn:
    id: "vehicle-year-input"
- inputText: "2020"

- tapOn:
    id: "vehicle-make-input"
- inputText: "Toyota"

- tapOn:
    id: "vehicle-model-input"
- inputText: "Camry"
- hideKeyboard

# Scroll down to find submit button and tap
- scrollUntilVisible:
    element:
      id: "submit-request-btn"
    direction: DOWN
- tapOn:
    id: "submit-request-btn"

# Verify the finding driver modal appears
- extendedWaitUntil:
    visible:
      text: "Searching"
    timeout: 10000
